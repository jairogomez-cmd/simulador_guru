<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador de Ventas - Gurú Soluciones</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .container { width: 100%; max-width: 700px; height: 90vh; display: flex; flex-direction: column; background: #1a1a2e; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .header { background: linear-gradient(135deg, #6c3fc5, #9b5de5); padding: 20px; text-align: center; }
  .header h1 { font-size: 1.3rem; }
  .header p { font-size: 0.85rem; opacity: 0.8; margin-top: 4px; }
  .setup { padding: 30px; text-align: center; }
  .setup h2 { margin-bottom: 20px; color: #9b5de5; }
  .client-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .client-btn { padding: 16px 8px; border: 2px solid #333; border-radius: 12px; background: #16213e; cursor: pointer; transition: all 0.2s; font-size: 0.85rem; color: #ccc; }
  .client-btn:hover, .client-btn.selected { border-color: #9b5de5; background: #2a1a4e; color: #fff; }
  .client-btn span { display: block; font-size: 1.5rem; margin-bottom: 6px; }
  .start-btn { background: linear-gradient(135deg, #6c3fc5, #9b5de5); color: white; border: none; padding: 14px 40px; border-radius: 25px; font-size: 1rem; cursor: pointer; opacity: 0.5; pointer-events: none; transition: all 0.2s; }
  .start-btn.active { opacity: 1; pointer-events: all; }
  .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 0.9rem; line-height: 1.5; }
  .message.client { background: #16213e; border: 1px solid #2a2a4e; align-self: flex-start; }
  .message.vendor { background: linear-gradient(135deg, #6c3fc5, #9b5de5); align-self: flex-end; }
  .message.feedback { background: #0d2137; border: 1px solid #1a5276; align-self: center; width: 100%; white-space: pre-wrap; font-size: 0.85rem; }
  .message.system { background: #1a2e1a; border: 1px solid #2a4a2a; align-self: center; color: #7dcea0; font-size: 0.8rem; text-align: center; padding: 8px 16px; }
  .input-area { padding: 16px; border-top: 1px solid #2a2a4e; display: flex; gap: 10px; }
  .input-area input { flex: 1; background: #16213e; border: 1px solid #2a2a4e; color: #fff; padding: 12px 16px; border-radius: 25px; font-size: 0.9rem; outline: none; }
  .input-area input:focus { border-color: #9b5de5; }
  .send-btn { background: linear-gradient(135deg, #6c3fc5, #9b5de5); border: none; color: white; width: 46px; height: 46px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; }
  .typing { color: #888; font-style: italic; font-size: 0.8rem; padding: 0 20px 8px; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎯 Simulador de Ventas</h1>
    <p>Gurú Soluciones — Entrenamiento de Vendedores</p>
  </div>

  <div class="setup" id="setup">
    <h2>¿Con qué cliente quieres practicar?</h2>
    <div class="client-grid">
      <div class="client-btn" onclick="selectClient('tacaño', this)"><span>💸</span>Tacaño</div>
      <div class="client-btn" onclick="selectClient('enojado', this)"><span>😠</span>Enojado</div>
      <div class="client-btn" onclick="selectClient('hablador', this)"><span>🗣️</span>Hablador</div>
      <div class="client-btn" onclick="selectClient('desconfiado', this)"><span>🤨</span>Desconfiado</div>
      <div class="client-btn" onclick="selectClient('ocupado', this)"><span>⏰</span>Ocupado</div>
      <div class="client-btn" onclick="selectClient('decisivo', this)"><span>✅</span>Decisivo</div>
    </div>
    <button class="start-btn" id="startBtn" onclick="startSimulation()">🚀 Iniciar Simulación</button>
  </div>

  <div class="chat-area hidden" id="chatArea"></div>
  <div class="typing hidden" id="typing">El cliente está escribiendo...</div>
  <div class="input-area hidden" id="inputArea">
    <input type="text" id="msgInput" placeholder="Escribe tu mensaje... (FIN para terminar)" onkeypress="handleKey(event)"/>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  const WEBHOOK_URL = 'https://n8n.srv1005169.hstgr.cloud/webhook/simulador_guru';

  let sessionId = 'session_' + Date.now();
  let selectedClient = null;

  function selectClient(type, el) {
    document.querySelectorAll('.client-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedClient = type;
    document.getElementById('startBtn').classList.add('active');
  }

  async function startSimulation() {
    document.getElementById('setup').classList.add('hidden');
    document.getElementById('chatArea').classList.remove('hidden');
    document.getElementById('typing').classList.remove('hidden');
    document.getElementById('inputArea').classList.remove('hidden');

    addMessage('system', `Simulación iniciada — Cliente: <strong>${selectedClient.toUpperCase()}</strong><br><small>Escribe <strong>FIN</strong> al terminar para recibir tu retroalimentación</small>`);

    const response = await callWebhook('Hola, buenas tardes.', true);
    document.getElementById('typing').classList.add('hidden');
    addMessage('client', response);
  }

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';

    addMessage('vendor', msg);
    document.getElementById('typing').classList.remove('hidden');

    const response = await callWebhook(msg, false);
    document.getElementById('typing').classList.add('hidden');

    if (msg.toUpperCase() === 'FIN') {
      addMessage('feedback', response);
      document.getElementById('inputArea').classList.add('hidden');
      addMessage('system', '✅ Simulación finalizada. Revisa tu retroalimentación arriba.');
    } else {
      addMessage('client', response);
    }
  }

  async function callWebhook(message, isNew) {
    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 
          'Content-Type': 'text/plain'
        },
        body: JSON.stringify({ sessionId, message, clientType: selectedClient, isNew })
      });
      const data = await res.json();
      return data.response || data.text || data.output || '(sin respuesta)';
    } catch(e) {
      return '⚠️ Error conectando con n8n. Verifica que el workflow esté activo.';
    }
  }

  function addMessage(type, text) {
    const chat = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function handleKey(e) {
    if (e.key === 'Enter') sendMessage();
  }
</script>
</body>
</html>
